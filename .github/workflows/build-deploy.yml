name: Build and Deploy Resume

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build builder image
        uses: docker/build-push-action@v6
        env:
          DOCKER_BUILD_RECORD_UPLOAD: "false"
        with:
          context: .
          file: ./Dockerfile
          tags: resume-builder:ci
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build resume in container
        run: >
          docker run --rm
          -v "${{ github.workspace }}:/workspace"
          -w /workspace
          resume-builder:ci
          sh -lc "uv sync --frozen && uv run src/build.py"

      - name: Prepare Pages artifact
        run: |
          mkdir -p _site
          cp resume.pdf _site/
          cp src/index.html _site/
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          name: resume-pages
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          artifact_name: resume-pages
        timeout-minutes: 10
        continue-on-error: true

      - name: Wait before retry
        if: steps.deployment.outcome == 'failure'
        run: sleep 30

      - name: Retry deploy to GitHub Pages
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4
        with:
          artifact_name: resume-pages
        timeout-minutes: 10
